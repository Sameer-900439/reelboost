<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — ReelBoost</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
  <style>
    .admin-container { max-width: 400px; padding-top: 10vh; margin: 0 auto; }
    .admin-logo { text-align: center; color: var(--accent-1); font-size: 2rem; margin-bottom: 24px; font-weight: 800; }
  </style>
</head>
<body>
  <div class="bg-particles" aria-hidden="true">
    <div class="particle"></div><div class="particle"></div><div class="particle"></div>
  </div>

  <main class="container admin-container">
    <div class="admin-logo">⚡ ReelBoost Admin</div>
    
    <section class="card">
      <h2 class="card-title">Secure Portal</h2>
      <p class="card-desc">Enter your administrator credentials.</p>
      
      <form id="adminForm">
        <div class="input-group">
          <label for="adminEmail">Email Address</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
              <polyline points="22,6 12,13 2,6"></polyline>
            </svg>
            <input type="email" id="adminEmail" placeholder="admin@example.com" required />
          </div>
        </div>
        
        <div class="input-group" style="margin-top:16px;">
          <label for="adminPassword">Password</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            <input type="password" id="adminPassword" placeholder="••••••••" required />
          </div>
        </div>

        <div id="adminError" class="error-msg" style="display:none; margin-top:10px;"></div>

        <button type="submit" class="btn-submit" id="loginBtn" style="margin-top:20px;">
          <span class="btn-text">Log In to Dashboard</span>
        </button>
      </form>
    </section>
  </main>

  <script src="/admin.js"></script>
</body>
</html>
